<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../styles/estilos.css" />
    <title>Formulario de Contacto</title>
  </head>
  <body>
    <header>
      <h1>Formulario de Contacto</h1>
    </header>

    <main>
      <section class="card form-card">
        <h3>💻 Contacto Profesional</h3>

        <form
          class="form-pro"
          id="formContacto"
          action="https://formspree.io/f/maqlwnjz"
          method="POST"
        >
          <input type="text" name="nombre" placeholder="Nombre" required />

          <input type="email" name="email" placeholder="Correo" required />

          <select name="motivo" required>
            <option value="">Motivo</option>
            <option value="Oportunidad laboral">Oportunidad laboral</option>
            <option value="Proyecto freelance">Proyecto freelance</option>
            <option value="Colaboración">Colaboración</option>
          </select>

          <textarea name="mensaje" placeholder="Mensaje" required></textarea>

          <input
            type="hidden"
            name="_subject"
            value="Nuevo contacto desde tu portafolio web."
          />

          <button type="submit">Enviar</button>
        </form>
      </section>

      <section class="card form-card">
        <h3>🤝 Patrocinio MMA</h3>

        <form class="form-pro" id="formSponsor">
          <input
            type="text"
            name="empresa"
            placeholder="Empresa / Persona"
            required
          />
          <input type="email" name="email" placeholder="Correo" required />

          <select name="apoyo" required>
            <option value="">Tipo de apoyo</option>
            <option>Económico</option>
            <option>Ropa deportiva</option>
            <option>Suplementos</option>
            <option>Publicidad</option>
          </select>

          <textarea
            name="mensaje"
            placeholder="Cuéntame sobre tu propuesta"
            required
          ></textarea>

          <button type="submit">Enviar propuesta</button>

          <p class="msg-ok" id="msg2">Propuesta enviada correctamente.</p>
        </form>
      </section>
    </main>

    <script>
      function activarForm(idForm, idMsg) {
        const form = document.getElementById(idForm);
        const msg = document.getElementById(idMsg);

        form.addEventListener("submit", (e) => {
          e.preventDefault();

          const inputs = form.querySelectorAll("input,select,textarea");

          let valido = true;

          inputs.forEach((i) => {
            if (!i.value) {
              i.style.border = "1px solid red";
              valido = false;
            } else {
              i.style.border = "1px solid #00ff9c";
            }
          });

          if (valido) {
            msg.style.display = "block";
            form.reset();
          }
        });
      }

      activarForm("formContacto", "msg1");
      activarForm("formSponsor", "msg2");
    </script>
  </body>
</html>
