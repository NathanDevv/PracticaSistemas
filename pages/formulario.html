<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../styles/estilos.css" />
    <title>Contacto - Nathan Torres</title>
  </head>

  <body>
    <header class="header">
      <h1>Nathan Torres</h1>
      <p>Contacto Profesional</p>
    </header>

    <div class="app">
      <aside class="sidebar">
        <h2 class="logo">Nathan Torres</h2>

        <img
          class="fotoNathan"
          src="../img/fotoNathan.jpg"
          alt="Foto de Nathan"
        />

        <nav>
          <a href="./dashboard.html">Dashboard</a>
          <a href="./acerca.html">About Me</a>
          <a href="#">Skills</a>
          <a href="#">Proyectos</a>
          <a href="./formulario.html" class="active">Contacto</a>
        </nav>
      </aside>

      <main class="main">
        <section class="card form-card">
          <h3>💻 Contacto Profesional</h3>

          <form
            class="form-pro"
            action="https://formspree.io/f/maqlwnjz"
            method="POST"
          >
            <input type="text" name="nombre" placeholder="Nombre" required />

            <input type="email" name="email" placeholder="Correo" required />

            <select name="motivo" required>
              <option value="">Motivo</option>
              <option value="Oportunidad laboral">Oportunidad laboral</option>
              <option value="Proyecto freelance">Proyecto freelance</option>
              <option value="Colaboración">Colaboración</option>
            </select>

            <textarea name="mensaje" placeholder="Mensaje" required></textarea>

            <input
              type="hidden"
              name="_subject"
              value="Nuevo contacto desde tu portafolio 🔥"
            />

            <button type="submit">Enviar</button>
          </form>
        </section>

        <section class="card form-card">
          <h3>🤝 Patrocinio MMA</h3>

          <form
            class="form-pro"
            action="https://formspree.io/f/maqlwnjz"
            method="POST"
          >
            <input
              type="text"
              name="empresa"
              placeholder="Empresa / Persona"
              required
            />

            <input type="email" name="email" placeholder="Correo" required />

            <select name="apoyo" required>
              <option value="">Tipo de apoyo</option>
              <option value="Económico">Económico</option>
              <option value="Ropa deportiva">Ropa deportiva</option>
              <option value="Suplementos">Suplementos</option>
              <option value="Publicidad">Publicidad</option>
            </select>

            <textarea
              name="mensaje"
              placeholder="Cuéntame sobre tu propuesta"
              required
            ></textarea>

            <input
              type="hidden"
              name="_subject"
              value="Nueva propuesta de patrocinio 🥊"
            />

            <button type="submit">Enviar propuesta</button>
          </form>
        </section>
      </main>
    </div>

    <footer class="footer">
      <p>© 2026 Nathan Torres</p>
    </footer>
  </body>
</html>
